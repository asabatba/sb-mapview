name: mapview
version: 0.1
imports:
  - https://get.silverbullet.md/global.plug.json
functions:
  insertMapView:
    path: ./src/index.ts:insertMapView
    command:
      name: "MapView: Insert Widget"
      requireMode: rw

  insertMapViewGpx:
    path: ./src/index.ts:insertMapViewGpx
    command:
      name: "MapView: Insert GPX Widget"
      requireMode: rw

  insertMapViewGeoJson:
    path: ./src/index.ts:insertMapViewGeoJson
    command:
      name: "MapView: Insert GeoJSON Widget"
      requireMode: rw

  insertMapViewMarkers:
    path: ./src/index.ts:insertMapViewMarkers
    command:
      name: "MapView: Insert Marker Widget"
      requireMode: rw

  renderMapViewWidget:
    path: ./src/index.ts:renderMapViewWidget
    codeWidget: mapview

  mapViewSlashComplete:
    path: ./src/index.ts:mapViewSlashComplete
    events:
      - slash:complete

  showMapViewSidebar:
    path: "./src/index.ts:enableMapViewSidebar"

  hideMapViewSidebar:
    path: "./src/index.ts:disableMapViewSidebar"

  toggle:
    path: "./src/index.ts:toggleMapViewSidebar"
    command:
      name: "Map Sidebar: Toggle"
      # key: Ctrl-alt-o
      # mac: Cmd-alt-o

  showMapViewSidebarOnInit:
    path: "./src/index.ts:initMapViewSidebar"
    events:
      - editor:init
      - editor:updated

  # list:
